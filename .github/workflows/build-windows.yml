name: Build Windows EXE
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx --yes electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: anon-ai-windows-exe
          path: dist/*.exe
