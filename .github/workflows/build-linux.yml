name: Build Linux AppImage
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx --yes electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: anon-ai-linux-appimage
          path: dist/*.AppImage
