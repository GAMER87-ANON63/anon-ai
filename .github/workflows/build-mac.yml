name: Build Mac DMG
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: npx --yes electron-builder --mac
      - uses: actions/upload-artifact@v4
        with:
          name: anon-ai-mac-dmg
          path: dist/*.dmg
